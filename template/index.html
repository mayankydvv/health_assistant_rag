<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('logout') }}" class="logoutBtn">
            <div class="sign">
                <svg viewBox="0 0 512 512">
                    <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
                </svg>
            </div>
            <div class="text">Logout</div>
        </a>
    </nav>

    <div class="container">
        <h1>AI Health Assistant</h1>

        <div class="symptom-section">
            <h2>Describe Your Symptom / Health Chat</h2>
            
            <div id="chat-messages" class="response-box" style="height: 150px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
                </div>
            
            <input type="text" id="symptomInput" placeholder="Type your symptom or click to speak...">
            
            <button onclick="handleSymptomInput()" class="custom-speech-btn">
                Send 
            </button>
            <button onclick="speakSymptom()" class="custom-speech-btn">
                🎤 Speak Symptom
            </button>
        </div>
        <div class="chart-section">
            <h2>Your Sickness Frequency</h2>
            <canvas id="sicknessChart"></canvas>
        </div>
        <div class="reminder-section">
            <h2>Set Medicine Reminder</h2>
            <input type="text" id="medicine" placeholder="Enter medicine name">

            <select id="reminderType" onchange="toggleReminderFields()">
                <option value="minutes">In X Minutes</option>
                <option value="today">Today at Time</option>
                <option value="daily">Every Day at Time</option>
            </select>

            <div id="minutesContainer">
                <input type="number" id="minutesInput" placeholder="Minutes from now" min="1">
            </div>

            <div id="timeContainer" style="display: none;">
                <input type="time" id="timeInput">
            </div>

            <button onclick="setReminder()" class="custom-speech-btn">
                💊 Set Reminder
            </button>
        </div>
        <div id="activeReminders" class="reminders-list">
            <h2>Your Active Reminders</h2>
            </div>
        <button class="btn-71" onclick="toggleLogs()">📋 Toggle Health Logs</button>

        <div id="healthLogs">
            <h2>Health Logs</h2>
            <div class="log-table-container">
                <div id="logContent">Loading logs...</div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
